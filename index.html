<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Park Regis Hotel — IT Command Centre</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeecea;
  --tx: #1a1a18; --tx2: #6b6b68; --tx3: #9b9b97;
  --bd: rgba(0,0,0,0.1); --bd2: rgba(0,0,0,0.18);
  --rmd: 8px; --rlg: 12px; --rxl: 16px;
  --font: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono: 'SF Mono','Fira Code',monospace;
  --green: #639922; --gl: #EAF3DE; --gd: #27500A;
  --amber: #BA7517; --al: #FAEEDA; --ad: #633806;
  --red: #E24B4A; --rl: #FCEBEB; --rd: #A32D2D;
  --blue: #378ADD; --bl: #E6F1FB; --bd3: #185FA5;
  --purple: #7F77DD; --pl: #EEEDFE; --pd2: #3C3489;
  --teal: #1A9E8F; --tl: #D5F5F1;
  --navy: #0a1628;
}
@media(prefers-color-scheme:dark) {
  :root {
    --bg: #1e1e1c; --bg2: #2a2a28; --bg3: #141412;
    --tx: #f0ede8; --tx2: #9b9997; --tx3: #6b6b68;
    --bd: rgba(255,255,255,0.1); --bd2: rgba(255,255,255,0.18);
  }
}
body { font-family: var(--font); background: var(--bg3); color: var(--tx); height: 100vh; overflow: hidden; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 2px; }
.app { display: flex; height: 100vh; }
.sb { width: 220px; min-width: 220px; background: var(--navy); display: flex; flex-direction: column; overflow-y: auto; }
.sb-logo { padding: 18px 16px 14px; border-bottom: 0.5px solid rgba(255,255,255,0.07); }
.logo-mark { width: 34px; height: 34px; background: var(--green); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; }
.hotel-name { color: #fff; font-size: 13px; font-weight: 500; }
.hotel-sub { color: rgba(255,255,255,0.35); font-size: 10px; margin-top: 1px; letter-spacing: .5px; text-transform: uppercase; }
.nav { display: flex; align-items: center; gap: 9px; padding: 9px 16px; color: rgba(255,255,255,0.55); font-size: 13px; cursor: pointer; border-radius: 6px; margin: 1px 8px; user-select: none; }
.nav:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); }
.nav.active { background: rgba(99,153,34,0.22); color: #a8d96c; }
.nav i { font-size: 16px; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { background: var(--bg); border-bottom: 0.5px solid var(--bd); padding: 0 20px; height: 54px; display: flex; align-items: center; gap: 10px; }
.topbar-title { font-size: 15px; font-weight: 500; flex: 1; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 13px; border: none; border-radius: var(--rmd); font-size: 12px; font-weight: 500; cursor: pointer; font-family: var(--font); }
.btn:hover { opacity: 0.85; }
.btn-navy { background: var(--navy); color: #a8d96c; }
.btn-ai { background: #1a2e4a; color: #a8d96c; }
.btn-teal { background: var(--teal); color: #fff; }
.btn-ghost { background: var(--bg2); color: var(--tx2); border: 0.5px solid var(--bd); }
.content { flex: 1; overflow-y: auto; padding: 16px 20px 24px; }
.panel { background: var(--bg); border: 0.5px solid var(--bd); border-radius: var(--rlg); overflow: hidden; margin-bottom: 12px; }
.ai-panel { background: var(--navy); border-radius: var(--rlg); padding: 16px; margin-bottom: 14px; }
.ai-inp { width: 100%; flex: 1; background: rgba(255,255,255,0.07); border: 0.5px solid rgba(255,255,255,0.13); border-radius: var(--rmd); padding: 9px 12px; color: #fff; font-size: 13px; outline: none; }
.ai-inp::placeholder { color: rgba(255,255,255,0.25); }
.ai-send { background: var(--green); border: none; border-radius: var(--rmd); padding: 9px 16px; color: #fff; font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--font); }
.ai-resp { margin-top: 11px; font-size: 12px; color: rgba(255,255,255,0.65); line-height: 1.75; min-height: 14px; }
.row { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 0.5px solid var(--bd); }
.row:hover { background: var(--bg2); }
.empty { padding: 40px 20px; text-align: center; color: var(--tx3); }
.badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
.b-assigned { background: var(--gl); color: var(--gd); }
.b-available { background: var(--bl); color: var(--bd3); }
.b-maintenance { background: var(--al); color: var(--ad); }
.b-retired { background: #F1EFE8; color: #5F5E5A; }
.b-lost { background: var(--rl); color: var(--rd); }
.modal { background: var(--bg); border-radius: var(--rxl); padding: 22px; width: 520px; max-width: 95vw; max-height: 92vh; overflow-y: auto; border: 0.5px solid var(--bd); }
.mh { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.mt { font-size: 15px; font-weight: 500; }
.mc { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--tx2); }
.fr { margin-bottom: 13px; }
.fr2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 13px; }
.fl { font-size: 12px; color: var(--tx2); margin-bottom: 5px; display: block; }
.fi, .fs, .fta { width: 100%; padding: 9px 11px; border: 0.5px solid var(--bd2); border-radius: var(--rmd); background: var(--bg); color: var(--tx); font-size: 13px; font-family: var(--font); outline: none; }
.fi:focus, .fs:focus, .fta:focus { border-color: var(--green); }
.fta { min-height: 72px; }
.mf { display: flex; gap: 8px; justify-content: flex-end; margin-top: 6px; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; align-items: center; justify-content: center; }
.overlay.show { display: flex; }
.save-toast { position: fixed; bottom: 20px; right: 20px; padding: 9px 18px; border-radius: var(--rmd); font-size: 12px; font-weight: 500; z-index: 9999; opacity: 0; transition: opacity .3s; }
.save-toast.show { opacity: 1; background: var(--navy); color: #a8d96c; }
.loading-screen { position: fixed; inset: 0; background: var(--navy); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9998; }
.loading-screen.hide { opacity: 0; pointer-events: none; transition: opacity .4s; }
.spin { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.15); border-top-color: #a8d96c; border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.action-menu { position: relative; display: inline-block; }
.action-btn { background: none; border: 0.5px solid var(--bd); border-radius: var(--rmd); padding: 5px 9px; cursor: pointer; font-size: 11px; color: var(--tx2); font-family: var(--font); display: flex; align-items: center; gap: 4px; }
.action-btn:hover { background: var(--bg2); }
.dropdown { position: absolute; right: 0; top: calc(100% + 4px); background: var(--bg); border: 0.5px solid var(--bd2); border-radius: var(--rmd); min-width: 180px; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.14); }
.dd-item { padding: 9px 14px; font-size: 12px; cursor: pointer; color: var(--tx); display: flex; align-items: center; gap: 8px; }
.dd-item:hover { background: var(--bg2); }
.dd-item.danger { color: var(--red); }
.dd-sep { height: 0.5px; background: var(--bd); margin: 3px 0; }
.dd-label { padding: 6px 14px 3px; font-size: 10px; color: var(--tx3); text-transform: uppercase; letter-spacing: .5px; }
@media(max-width:768px) {
  .sb { width: 54px; }
  .hotel-name, .hotel-sub, .nav span { display: none; }
  .nav { justify-content: center; padding: 11px; margin: 2px 4px; }
}
</style>
</head>
<body>

<div class="loading-screen" id="loading-screen">
  <div style="width:40px;height:40px;background:var(--green);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;margin-bottom:16px;">PR</div>
  <div class="spin"></div>
  <div style="color:rgba(255,255,255,0.6);font-size:13px;">Loading dashboard...</div>
</div>

<div class="save-toast" id="save-toast"></div>

<div class="app">
  <div class="sb">
    <div class="sb-logo">
      <div class="logo-mark">PR</div>
      <div class="hotel-name">Park Regis Hotel</div>
      <div class="hotel-sub">Business Bay · Dubai</div>
    </div>
    <div class="nav active" onclick="go('dashboard')"><i class="ti ti-layout-dashboard"></i><span>Dashboard</span></div>
    <div class="nav" onclick="go('tickets')"><i class="ti ti-ticket"></i><span>Tickets</span></div>
    <div class="nav" onclick="go('tasks')"><i class="ti ti-checklist"></i><span>Tasks</span></div>
    <div class="nav" onclick="go('assets')"><i class="ti ti-devices"></i><span>Assets</span></div>
    <div class="nav" onclick="go('amc')"><i class="ti ti-file-certificate"></i><span>AMC</span></div>
    <div class="nav" onclick="go('suppliers')"><i class="ti ti-building-store"></i><span>Suppliers</span></div>
    <div class="nav" onclick="go('contacts')"><i class="ti ti-address-book"></i><span>Contacts</span></div>
    <div style="margin-top:auto;padding:8px;">
      <div class="nav" onclick="go('settings')"><i class="ti ti-settings"></i><span>Settings</span></div>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <button class="btn btn-navy" onclick="openModal('ticket')"><i class="ti ti-plus"></i> New Ticket</button>
      <button class="btn btn-teal" onclick="openModal('asset')"><i class="ti ti-plus"></i> Add Asset</button>
      <button class="btn btn-ai" onclick="openModal('ai-full')"><i class="ti ti-robot"></i> Ask AI</button>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-box" onclick="event.stopPropagation()"></div>
</div>

<script>
// STORAGE
const DB_KEY = 'pr_it_v5';

function dbSave() {
  try {
    localStorage.setItem(DB_KEY, JSON.stringify({
      tickets: S.tickets,
      tasks: S.tasks,
      assets: S.assets,
      amc: S.amc,
      suppliers: S.suppliers,
      contacts: S.contacts,
      _tid: S._tid, _tsid: S._tsid, _aid: S._aid, _sid: S._sid, _cid: S._cid, _asid: S._asid
    }));
    const t = document.getElementById('save-toast');
    t.textContent = '✓ Saved';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1500);
  } catch(e) {}
}

function dbLoad() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      S.tickets = d.tickets || [];
      S.tasks = d.tasks || [];
      S.assets = d.assets || [];
      S.amc = d.amc || [];
      S.suppliers = d.suppliers || [];
      S.contacts = d.contacts || [];
      S._tid = d._tid || 0;
      S._tsid = d._tsid || 0;
      S._aid = d._aid || 0;
      S._sid = d._sid || 0;
      S._cid = d._cid || 0;
      S._asid = d._asid || 0;
    }
  } catch(e) {
    console.error('Load error:', e);
  }
}

// STATE
const S = {
  view: 'dashboard',
  tickets: [], tasks: [], assets: [], amc: [], suppliers: [], contacts: [],
  _tid: 0, _tsid: 0, _aid: 0, _sid: 0, _cid: 0, _asid: 0
};

const ASSET_TYPES = ['Computer (Desktop)', 'Laptop', 'Mobile Phone', 'Telephone', 'Printer', 'Keyboard', 'Mouse', 'SIM Card', 'Tablet', 'Monitor', 'Other'];
const DEPARTMENTS = ['IT', 'Front Office', 'F&B', 'Housekeeping', 'Engineering', 'Finance', 'HR', 'Sales', 'Security', 'Management', 'Other'];
const LOCATIONS = ['Server Room', 'IT Office', 'Reception', 'Floor 1', 'Floor 2', 'Floor 3', 'Floor 4', 'Floor 5', 'Floor 6', 'Floor 7', 'Floor 8', 'Floor 9', 'Floor 10', 'Basement', 'Other'];
const ASSET_STATUSES = ['Assigned', 'Available', 'In Maintenance', 'Retired', 'Lost / Stolen'];

// HELPERS
function uid(p, k) { S[k]++; return p + '-' + String(S[k]).padStart(3, '0'); }
function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function today() { return new Date().toLocaleDateString('en-GB', {weekday:'short', day:'numeric', month:'short', year:'numeric'}); }

// STARTUP
window.addEventListener('load', () => {
  try {
    dbLoad();
    setTimeout(() => {
      document.getElementById('loading-screen').classList.add('hide');
      setTimeout(() => { try { document.getElementById('loading-screen').remove(); } catch(e){} }, 400);
      render();
    }, 600);
  } catch(e) {
    console.error('Startup error:', e);
    alert('Error loading dashboard: ' + e.message);
  }
});

// NAV
function go(v) {
  S.view = v;
  document.querySelectorAll('.nav').forEach(el => el.classList.remove('active'));
  const views = ['dashboard', 'tickets', 'tasks', 'assets', 'amc', 'suppliers', 'contacts', 'settings'];
  const els = document.querySelectorAll('.nav');
  const i = views.indexOf(v);
  if (i >= 0 && els[i]) els[i].classList.add('active');
  const titles = {dashboard:'Dashboard', tickets:'Tickets', tasks:'Tasks', assets:'Assets', amc:'AMC', suppliers:'Suppliers', contacts:'Contacts', settings:'Settings'};
  document.getElementById('topbar-title').textContent = titles[v] || v;
  render();
}

function render() {
  try {
    const fn = {
      dashboard: renderDashboard,
      tickets: renderTickets,
      tasks: renderTasks,
      assets: renderAssets,
      amc: renderAMC,
      suppliers: renderSuppliers,
      contacts: renderContacts,
      settings: renderSettings
    };
    document.getElementById('content').innerHTML = (fn[S.view] || renderDashboard)();
  } catch(e) {
    console.error('Render error:', e);
    document.getElementById('content').innerHTML = '<div class="empty"><p>Error rendering: ' + e.message + '</p></div>';
  }
}

// DASHB BOARD
function renderDashboard() {
  const total = S.tickets.length + S.tasks.length + S.assets.length + S.amc.length + S.suppliers.length + S.contacts.length;
  return `
  <div class="ai-panel">
    <div style="font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px"><i class="ti ti-robot" style="font-size:13px;margin-right:6px"></i>AI Assistant</div>
    <div style="display:flex;gap:8px">
      <input class="ai-inp" id="ai-q" placeholder="Ask about your IT operations..." onkeydown="if(event.key==='Enter')askAI()">
      <button class="ai-send" onclick="askAI()">Ask</button>
    </div>
    <div class="ai-resp" id="ai-resp"></div>
  </div>
  ${total === 0 ? '<div class="panel"><div class="empty"><i class="ti ti-database-off"></i><p>Dashboard is empty. Start by adding tickets, assets, or contacts.</p></div></div>' : `
  <div class="panel">
    <div style="padding:16px;border-bottom:0.5px solid var(--bd)">
      <div style="font-size:13px;font-weight:500;margin-bottom:12px">Quick Stats</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;font-size:13px">
        <div><div style="color:var(--tx2);font-size:11px">Tickets</div><div style="font-size:20px;font-weight:500;color:var(--red)">${S.tickets.length}</div></div>
        <div><div style="color:var(--tx2);font-size:11px">Assets</div><div style="font-size:20px;font-weight:500;color:var(--teal)">${S.assets.length}</div></div>
        <div><div style="color:var(--tx2);font-size:11px">Tasks</div><div style="font-size:20px;font-weight:500;color:var(--amber)">${S.tasks.length}</div></div>
        <div><div style="color:var(--tx2);font-size:11px">AMC</div><div style="font-size:20px;font-weight:500;color:var(--navy)">${S.amc.length}</div></div>
      </div>
    </div>
    ${S.assets.length > 0 ? `
    <div style="padding:14px 16px;border-bottom:0.5px solid var(--bd)">
      <div style="font-size:12px;font-weight:500;margin-bottom:10px">Recent Assets</div>
      ${S.assets.slice(0,3).map(a => `
      <div class="row">
        <div style="flex:1;min-width:0"><div style="font-size:12px">${esc(a.name)}</div><div style="font-size:11px;color:var(--tx2)">${esc(a.type)}${a.assignedTo ? ' · ' + esc(a.assignedTo) : ''}</div></div>
        <span class="badge b-${a.status === 'Assigned' ? 'assigned' : a.status === 'Available' ? 'available' : 'maintenance'}">${esc(a.status)}</span>
      </div>`).join('')}
    </div>` : ''}
  </div>`}`;
}

function renderTickets() {
  return '<div class="panel">' + (S.tickets.length === 0 ? '<div class="empty"><p>No tickets yet.</p></div>' : S.tickets.map(t => `
  <div class="row">
    <div style="flex:1"><div style="font-size:13px">${esc(t.title)}</div><div style="font-size:11px;color:var(--tx2)">${esc(t.assignee || 'Unassigned')}</div></div>
    <button class="action-btn" onclick="delItem('tickets','${t.id}')"><i class="ti ti-trash"></i></button>
  </div>`).join('')) + '</div>';
}

function renderTasks() {
  return '<div class="panel">' + (S.tasks.length === 0 ? '<div class="empty"><p>No tasks yet.</p></div>' : S.tasks.map(t => `
  <div class="row">
    <input type="checkbox" style="accent-color:var(--green)" onchange="toggleTask('${t.id}')">
    <div style="flex:1"><div style="font-size:13px">${esc(t.title)}</div></div>
    <button class="action-btn" onclick="delItem('tasks','${t.id}')"><i class="ti ti-trash"></i></button>
  </div>`).join('')) + '</div>';
}

function renderAssets() {
  return '<div class="panel"><div style="padding:12px 16px;border-bottom:0.5px solid var(--bd);font-size:12px;font-weight:500">Assets (' + S.assets.length + ')</div>' + (S.assets.length === 0 ? '<div class="empty"><p>No assets yet.</p></div>' : `
  <table style="width:100%;font-size:12px;border-collapse:collapse">
  <tr style="background:var(--bg2)"><th style="padding:9px 12px;text-align:left;font-weight:500">Name</th><th style="padding:9px 12px">Type</th><th style="padding:9px 12px">Assigned To</th><th style="padding:9px 12px">Dept</th><th style="padding:9px 12px">Location</th><th style="padding:9px 12px">Status</th><th></th></tr>
  ${S.assets.map(a => `
  <tr style="border-bottom:0.5px solid var(--bd)">
    <td style="padding:9px 12px">${esc(a.name)}</td>
    <td style="padding:9px 12px;color:var(--tx2)">${esc(a.type)}</td>
    <td style="padding:9px 12px">${esc(a.assignedTo) || '—'}</td>
    <td style="padding:9px 12px;color:var(--tx2)">${esc(a.department) || '—'}</td>
    <td style="padding:9px 12px;color:var(--tx2)">${esc(a.location) || '—'}</td>
    <td style="padding:9px 12px"><span class="badge b-${asKey(a.status)}">${a.status}</span></td>
    <td style="padding:9px 12px"><div class="action-menu"><button class="action-btn" onclick="toggleAssetMenu('${a.id}')"><i class="ti ti-dots-vertical"></i></button><div id="m-${a.id}" style="display:none;position:absolute;right:0;top:calc(100%+4px);background:var(--bg);border:0.5px solid var(--bd2);border-radius:var(--rmd);min-width:150px;z-index:500;box-shadow:0 4px 16px rgba(0,0,0,0.14)"><div style="padding:9px 14px;font-size:12px;cursor:pointer;color:var(--tx)" onclick="editAsset('${a.id}');closeAssetMenu()">Edit</div><div style="padding:9px 14px;font-size:12px;cursor:pointer;color:var(--tx)" onclick="changeAssetStatus('${a.id}');closeAssetMenu()">Change Status</div><div style="padding:9px 14px;font-size:12px;cursor:pointer;color:var(--red)" onclick="delItem('assets','${a.id}');closeAssetMenu()">Delete</div></div></div></td>
  </tr>`).join('')}
  </table>`) + '</div>';
}

function asKey(s) {
  const m = {'Assigned': 'assigned', 'Available': 'available', 'In Maintenance': 'maintenance', 'Retired': 'retired', 'Lost / Stolen': 'lost'};
  return m[s] || 'available';
}

function toggleAssetMenu(id) {
  const m = document.getElementById('m-' + id);
  m.style.display = m.style.display === 'none' ? 'block' : 'none';
}

function closeAssetMenu() {
  document.querySelectorAll('[id^="m-"]').forEach(m => m.style.display = 'none');
}

function renderAMC() {
  return '<div class="panel">' + (S.amc.length === 0 ? '<div class="empty"><p>No AMC contracts yet.</p></div>' : S.amc.map(a => `
  <div style="padding:12px 16px;border-bottom:0.5px solid var(--bd)">
    <div style="font-size:13px;font-weight:500;margin-bottom:4px">${esc(a.vendor)}</div>
    <div style="font-size:11px;color:var(--tx2);margin-bottom:6px">${esc(a.scope)} · ${a.start} to ${a.end}</div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:12px">AED ${parseInt(a.valueNum || 0).toLocaleString()}</span>
      <button class="action-btn" onclick="delItem('amc','${a.id}')"><i class="ti ti-trash"></i></button>
    </div>
  </div>`).join('')) + '</div>';
}

function renderSuppliers() {
  return '<div class="panel">' + (S.suppliers.length === 0 ? '<div class="empty"><p>No suppliers yet.</p></div>' : S.suppliers.map(s => `
  <div class="row">
    <div style="flex:1"><div style="font-size:13px">${esc(s.name)}</div><div style="font-size:11px;color:var(--tx2)">${esc(s.category)}</div></div>
    <button class="action-btn" onclick="delItem('suppliers','${s.id}')"><i class="ti ti-trash"></i></button>
  </div>`).join('')) + '</div>';
}

function renderContacts() {
  return '<div class="panel">' + (S.contacts.length === 0 ? '<div class="empty"><p>No contacts yet.</p></div>' : S.contacts.map(c => `
  <div class="row">
    <div style="flex:1"><div style="font-size:13px">${esc(c.name)}</div><div style="font-size:11px;color:var(--tx2)">${esc(c.role) || ''}</div></div>
    <button class="action-btn" onclick="delItem('contacts','${c.id}')"><i class="ti ti-trash"></i></button>
  </div>`).join('')) + '</div>';
}

function renderSettings() {
  return '<div class="panel"><div style="padding:16px"><div style="font-size:14px;font-weight:500;margin-bottom:12px">Dashboard Info</div><div style="font-size:12px;color:var(--tx2);line-height:1.8"><div>Tickets: ' + S.tickets.length + '</div><div>Assets: ' + S.assets.length + '</div><div>Tasks: ' + S.tasks.length + '</div><div>Storage: Browser localStorage (persists across refresh)</div></div></div><div style="padding:16px;border-top:0.5px solid var(--bd)"><button class="btn btn-ghost" onclick="clearAll()" style="color:var(--red);border-color:var(--red)"><i class="ti ti-trash"></i> Clear All Data</button></div></div>';
}

// MODALS
function openModal(type) {
  const box = document.getElementById('modal-box');
  if (type === 'asset') {
    box.innerHTML = `
    <div class="mh"><span class="mt">Add Asset</span><button class="mc" onclick="closeModal()">×</button></div>
    <div class="fr"><label class="fl">Item name *</label><input class="fi" id="f-aname" placeholder="e.g. Dell Laptop"></div>
    <div class="fr2">
      <div><label class="fl">Type *</label><select class="fs" id="f-atype"><option value="">Select</option>${ASSET_TYPES.map(t => '<option value="' + t + '">' + t + '</option>').join('')}</select></div>
      <div><label class="fl">Serial No.</label><input class="fi" id="f-aserial" placeholder="SN-2024-001"></div>
    </div>
    <div class="fr2">
      <div><label class="fl">Handed to (name)</label><input class="fi" id="f-aassigned" placeholder="Employee name"></div>
      <div><label class="fl">Designation</label><input class="fi" id="f-adesig" placeholder="Position"></div>
    </div>
    <div class="fr2">
      <div><label class="fl">Department</label><select class="fs" id="f-adept"><option value="">Select</option>${DEPARTMENTS.map(d => '<option value="' + d + '">' + d + '</option>').join('')}</select></div>
      <div><label class="fl">Location</label><select class="fs" id="f-aloc"><option value="">Select</option>${LOCATIONS.map(l => '<option value="' + l + '">' + l + '</option>').join('')}</select></div>
    </div>
    <div class="fr"><label class="fl">Status</label><select class="fs" id="f-astatus">${ASSET_STATUSES.map(s => '<option value="' + s + '">' + s + '</option>').join('')}</select></div>
    <div class="mf"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-teal" onclick="submitAsset()"><i class="ti ti-plus"></i> Add Asset</button></div>`;
  } else if (type === 'ticket') {
    box.innerHTML = `
    <div class="mh"><span class="mt">New Ticket</span><button class="mc" onclick="closeModal()">×</button></div>
    <div class="fr"><label class="fl">Title *</label><input class="fi" id="f-title"></div>
    <div class="fr2">
      <div><label class="fl">Priority</label><select class="fs" id="f-priority"><option>Urgent</option><option>High</option><option>Medium</option><option>Low</option></select></div>
      <div><label class="fl">Assignee</label><input class="fi" id="f-ass"></div>
    </div>
    <div class="mf"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-navy" onclick="submitTicket()"><i class="ti ti-plus"></i> Create</button></div>`;
  } else if (type === 'ai-full') {
    box.innerHTML = `
    <div class="mh"><span class="mt"><i class="ti ti-robot"></i> AI Assistant</span><button class="mc" onclick="closeModal()">×</button></div>
    <div id="ai-hist" style="max-height:280px;overflow-y:auto;margin-bottom:14px;font-size:12px;color:var(--tx2)"><div style="text-align:center;padding:20px;color:var(--tx3)">Ask me anything about your IT dashboard...</div></div>
    <div style="display:flex;gap:8px"><input class="fi" id="f-ai-full" placeholder="Type your question..." onkeydown="if(event.key==='Enter')askAIFull()" style="flex:1"><button class="ai-send" onclick="askAIFull()">Send</button></div>`;
  }
  document.getElementById('overlay').classList.add('show');
  setTimeout(() => document.querySelector('.modal input') && document.querySelector('.modal input').focus(), 80);
}

function closeModal() { document.getElementById('overlay').classList.remove('show'); }

function submitAsset() {
  const name = document.getElementById('f-aname').value.trim();
  const type = document.getElementById('f-atype').value;
  if (!name || !type) { alert('Enter name and type'); return; }
  S.assets.unshift({
    id: uid('AS', '_asid'),
    name,
    type,
    serialNo: document.getElementById('f-aserial').value.trim(),
    assignedTo: document.getElementById('f-aassigned').value.trim(),
    designation: document.getElementById('f-adesig').value.trim(),
    department: document.getElementById('f-adept').value,
    location: document.getElementById('f-aloc').value,
    status: document.getElementById('f-astatus').value,
    addedOn: today()
  });
  closeModal(); dbSave(); render();
}

function submitTicket() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('Enter title'); return; }
  S.tickets.unshift({
    id: uid('TK', '_tid'),
    title,
    priority: document.getElementById('f-priority').value,
    assignee: document.getElementById('f-ass').value.trim() || 'Unassigned',
    status: 'open',
    created: today()
  });
  closeModal(); dbSave(); render();
}

function toggleTask(id) {
  const t = S.tasks.find(x => x.id === id);
  if (t) { t.done = !t.done; dbSave(); render(); }
}

function editAsset(id) {
  alert('Edit feature coming soon');
}

function changeAssetStatus(id) {
  const a = S.assets.find(x => x.id === id);
  if (!a) return;
  const newStatus = prompt('New status: Assigned, Available, In Maintenance, Retired, Lost / Stolen', a.status);
  if (newStatus && ASSET_STATUSES.includes(newStatus)) {
    a.status = newStatus;
    dbSave(); render();
  }
}

function delItem(col, id) {
  if (confirm('Delete this?')) {
    S[col] = S[col].filter(x => x.id !== id);
    dbSave(); render();
  }
}

function clearAll() {
  if (confirm('Delete ALL data?')) {
    S.tickets = []; S.tasks = []; S.assets = []; S.amc = []; S.suppliers = []; S.contacts = [];
    S._tid = 0; S._tsid = 0; S._aid = 0; S._sid = 0; S._cid = 0; S._asid = 0;
    localStorage.removeItem(DB_KEY);
    location.reload();
  }
}

// AI
function fillAI(q) {
  const inp = document.getElementById('ai-q');
  if (inp) { inp.value = q; askAI(); }
}

function askAI() {
  const inp = document.getElementById('ai-q');
  const resp = document.getElementById('ai-resp');
  if (!inp || !resp) return;
  const q = inp.value.trim();
  if (!q) return;
  resp.innerHTML = 'Asking Claude...';
  inp.value = '';
  const ctx = `IT dashboard data:\nTickets: ${JSON.stringify(S.tickets.slice(0, 5))}\nAssets: ${JSON.stringify(S.assets.slice(0, 5).map(a => ({name: a.name, type: a.type, assignedTo: a.assignedTo, status: a.status})))}\n`;
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 400,
      messages: [{role: 'user', content: ctx + 'Question: ' + q}]
    })
  }).then(r => r.json()).then(d => {
    if (resp) resp.innerHTML = (d.content[0]?.text || 'No response').replace(/\n/g, '<br>');
  }).catch(e => {
    if (resp) resp.innerHTML = '⚠ AI error. Check internet.';
  });
}

function askAIFull() {
  const inp = document.getElementById('f-ai-full');
  const hist = document.getElementById('ai-hist');
  if (!inp || !hist) return;
  const q = inp.value.trim();
  if (!q) return;
  inp.value = '';
  hist.innerHTML += '<div style="margin-bottom:8px;padding:8px;background:var(--bg2);border-radius:var(--rmd)"><strong>You:</strong> ' + esc(q) + '</div>';
  const lid = 'ail-' + Date.now();
  hist.innerHTML += '<div id="' + lid + '" style="margin-bottom:8px;padding:8px;border-left:2px solid var(--green)"><em>Thinking...</em></div>';
  hist.scrollTop = hist.scrollHeight;
  
  const ctx = `IT dashboard:\nTickets(${S.tickets.length}): ${JSON.stringify(S.tickets.slice(0,3))}\nAssets(${S.assets.length}): ${JSON.stringify(S.assets.slice(0,3))}\nTasks(${S.tasks.length}): ${JSON.stringify(S.tasks.slice(0,3))}\n`;
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 400,
      messages: [{role: 'user', content: ctx + q}]
    })
  }).then(r => r.json()).then(d => {
    const el = document.getElementById(lid);
    if (el) el.innerHTML = '<strong style="color:var(--green)">Claude:</strong><br>' + (d.content[0]?.text || 'Error').replace(/\n/g, '<br>');
  }).catch(e => {
    const el = document.getElementById(lid);
    if (el) el.innerHTML = '<span style="color:var(--red)">AI error</span>';
  });
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
